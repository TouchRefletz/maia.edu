name: Extract Questions

on:
  repository_dispatch:
    types: [extract-questions]
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug of the PDF collection on HuggingFace"
        required: true
      query:
        description: "Original search query for context"
        required: false
      institution:
        description: "Filter: Institution (e.g. ENEM, FUVEST)"
        required: false
      subject:
        description: "Filter: Subject (e.g. Física, Matemática)"
        required: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      GOOGLE_GENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
      WORKER_URL: https://maia-api-worker.willian-campos-ismart.workers.dev
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_REPO: toquereflexo/maia-deep-search
      SLUG: ${{ github.event.client_payload.slug || inputs.slug }}
      QUERY: ${{ github.event.client_payload.query || inputs.query || '' }}
      INSTITUTION: ${{ github.event.client_payload.institution || inputs.institution || '' }}
      SUBJECT: ${{ github.event.client_payload.subject || inputs.subject || '' }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          pip install google-genai pdf2image Pillow requests huggingface_hub

      - name: Setup & Download Manifest
        id: setup
        run: |
          python3 - <<'EOF'
          import os, json
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ.get("HF_TOKEN"))
          repo = os.environ["HF_REPO"]
          slug = os.environ["SLUG"]

          manifest = {"status": "starting", "slug": slug, "results": []}

          try:
              path = api.hf_hub_download(
                  repo_id=repo,
                  filename=f"output/{slug}/manifest.json",
                  repo_type="dataset",
                  local_dir="./hf_data"
              )
              with open(path) as f:
                  existing = json.load(f)

              if isinstance(existing, list):
                  manifest = {"status": "starting", "slug": slug, "results": existing}
              elif isinstance(existing, dict):
                  manifest = existing
                  if "status" not in manifest:
                      manifest["status"] = "starting"
                  if "slug" not in manifest:
                      manifest["slug"] = slug

                  if "extraction_results" not in manifest:
                      manifest["extraction_results"] = {}

                  if manifest.get("rate_limit_hit"):
                      print("⚡ Resuming from rate-limited checkpoint!")
                      manifest["rate_limit_hit"] = False
                  elif manifest.get("status") == "complete":
                      print("✅ Extraction already complete, nothing to do")
                  else:
                      print(f"📋 Resuming from existing manifest (status: {manifest.get('status')})")
              
          except Exception as e:
              print(f"📋 No existing manifest: {e}")

          os.makedirs("work", exist_ok=True)
          with open("work/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("has_manifest=true\n")
          EOF

      - name: Run Extraction Pipeline
        if: steps.setup.outputs.has_manifest == 'true'
        run: python3 .github/scripts/extract_pipeline.py
        env:
          MANIFEST_PATH: work/manifest.json

      - name: Upload Manifest to HuggingFace
        if: always() && steps.setup.outputs.has_manifest == 'true'
        run: |
          python3 - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ.get("HF_TOKEN"))
          repo = os.environ["HF_REPO"]
          slug = os.environ["SLUG"]
          manifest_path = "work/manifest.json"

          if os.path.exists(manifest_path):
              api.upload_file(
                  path_or_fileobj=manifest_path,
                  path_in_repo=f"output/{slug}/manifest.json",
                  repo_id=repo,
                  repo_type="dataset",
                  commit_message=f"[extract-questions] Update manifest for {slug}"
              )
              print(f"✅ Manifest uploaded to {repo}/output/{slug}/manifest.json")
          else:
              print("⚠️ No manifest to upload")
          EOF

      - name: Summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os

          manifest_path = "work/manifest.json"
          if not os.path.exists(manifest_path):
              print("No manifest found")
              exit(0)

          with open(manifest_path) as f:
              m = json.load(f)

          total_extracted = 0
          total_skipped = 0
          total_failed = 0

          items = []
          if isinstance(m, list):
              items = m
          elif isinstance(m, dict):
              items = m.get("results", m.get("files", m.get("items", [])))

          for item in items:
              data = item.get("extraction_results", {})
              for page, pdata in data.get("pages", {}).items():
                  for q in pdata.get("questions", []):
                      if q["status"] == "extracted":
                          total_extracted += 1
                      elif q["status"] == "skipped_dedup":
                          total_skipped += 1
                      elif q["status"] == "failed":
                          total_failed += 1

          print(f"📊 Extraction Summary:")
          if isinstance(m, dict):
              print(f"   Status: {m.get('status', 'unknown')}")
              print(f"   Rate limited: {m.get('rate_limit_hit', False)}")
          print(f"   Extracted: {total_extracted}")
          print(f"   Skipped (dedup): {total_skipped}")
          print(f"   Failed: {total_failed}")
          EOF
